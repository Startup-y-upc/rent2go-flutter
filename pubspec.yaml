  geolocator: ^14.0.0
  http: ^1.2.1
  flutter_stripe: ^11.1.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/legal/terms-and-conditions.md