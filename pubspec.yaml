name: rent2go
description: App de alquiler de coches Rent2Go
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  go_router: ^13.0.0
  image_picker: ^1.0.7
  gap: ^3.0.1
  email_validator: ^2.1.17
